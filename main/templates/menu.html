<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dropdown-Menü Beispiel{% endblock %}</title>
    <style>
        /* Your CSS from the original code goes here */
    </style>
</head>
<body>

    <nav>
        <ul>
            <li class="menu-item"><a href="#">Startseite</a></li>
            <li class="menu-item"><a href="#">Über uns</a></li>

            <li class="menu-item services">
                <a href="#">Leistungen</a>
                <div class="dropdown-menu">
                    <a href="#">Softwareentwicklung</a>
                    <a href="#">Softwaretests</a>
                    <a href="#">Qualitätssicherung</a>
                </div>
            </li>

            <li class="menu-item"><a href="#">Karriere</a></li>
            <li class="menu-item"><a href="#">Kontakt</a></li>

            <!-- Language Dropdown -->
            <li class="menu-item language-dropdown">
                <a href="javascript:void(0);">Sprache</a>
                <div class="dropdown-menu">
                    <a href="{% url 'set_language' %}?language=de">Deutsch</a>
                    <a href="{% url 'set_language' %}?language=en">Englisch</a>
                    <a href="{% url 'set_language' %}?language=fr">Französisch</a>
                    <a href="{% url 'set_language' %}?language=nl">Niederländisch</a>
                </div>
            </li>
        </ul>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
    // Toggle Services dropdown on click
    document.querySelector('.services').addEventListener('click', function () {
        this.classList.toggle('active');
    });

    // Toggle Language dropdown on click
    document.querySelector('.language-dropdown').addEventListener('click', function (e) {
        // Prevent click event from bubbling up to the parent elements
        e.stopPropagation();
        this.classList.toggle('active');
    });

    // Close the language dropdown when clicking anywhere outside of the dropdown
    document.addEventListener('click', function (e) {
        const languageDropdown = document.querySelector('.language-dropdown');
        if (!languageDropdown.contains(e.target)) {
            languageDropdown.classList.remove('active');
        }
    });
});

    </script>

</body>
</html>
