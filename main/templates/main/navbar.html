{% load static i18n %}

<nav class="navbar">
    <div class="nav-content">

        <div class="logo">
            <a href="{% url 'home' %}">
                <img
                    src="{% static 'images/Logo_new.png' %}"
                    alt="SolutionsTestLab Logo"
                    class="navbar-logo"
                >
            </a>
        </div>

        <ul class="nav-links">

            <li>
                <a href="{% url 'home' %}">
                    Startseite
                </a>
            </li>

            <li>
                <a href="{% url 'about' %}">
                    Über uns
                </a>
            </li>

            <li class="nav-dropdown">
                <button type="button" class="nav-link-btn">
                    Leistungen ▾
                </button>

                <div class="dropdown-menu">
                    <a href="{% url 'quality_assurance' %}">
                        Qualitätssicherung
                    </a>

                    <a href="{% url 'software_testing' %}">
                        Softwaretests
                    </a>

                    <a href="{% url 'test_management' %}">
                        Testmanagement
                    </a>
                </div>
            </li>

            <li>
                <a href="{% url 'careers' %}">
                    Karriere
                </a>
            </li>

            <li>
                <a href="{% url 'contact' %}">
                    Kontakt
                </a>
            </li>

            <li>
                <a href="{% url 'blog' %}">
                    Blog
                </a>
            </li>

            <li class="nav-dropdown">
                <button type="button" class="nav-link-btn">
                    🌐 {% get_current_language as CURRENT_LANGUAGE %}
                    {{ CURRENT_LANGUAGE|upper }} ▾
                </button>

                <div class="dropdown-menu language-menu">

                    <form action="{% url 'set_language' %}" method="post">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="/de/">
                        <button type="submit" name="language" value="de">
                            🇩🇪 Deutsch
                        </button>
                    </form>

                    <form action="{% url 'set_language' %}" method="post">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="/en/">
                        <button type="submit" name="language" value="en">
                            🇬🇧 Englisch
                        </button>
                    </form>

                    <form action="{% url 'set_language' %}" method="post">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="/fr/">
                        <button type="submit" name="language" value="fr">
                            🇫🇷 Französisch
                        </button>
                    </form>

                    <form action="{% url 'set_language' %}" method="post">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="/nl/">
                        <button type="submit" name="language" value="nl">
                            🇳🇱 Niederländisch
                        </button>
                    </form>

                </div>
            </li>

            <li>
                <a class="nav-cta" href="{% url 'contact' %}">
                    QA-Audit anfordern
                </a>
            </li>

        </ul>
    </div>
</nav>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const dropdowns = document.querySelectorAll(".nav-dropdown");

    dropdowns.forEach(function (dropdown) {
        const button = dropdown.querySelector(".nav-link-btn");

        button.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();

            dropdowns.forEach(function (item) {
                if (item !== dropdown) {
                    item.classList.remove("open");
                }
            });

            dropdown.classList.toggle("open");
        });
    });

    document.querySelectorAll(".dropdown-menu").forEach(function (menu) {
        menu.addEventListener("click", function (event) {
            event.stopPropagation();
        });
    });

    document.addEventListener("click", function () {
        dropdowns.forEach(function (dropdown) {
            dropdown.classList.remove("open");
        });
    });
});
</script>
